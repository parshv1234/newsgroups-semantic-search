version: "3.9"

services:
  newsgroups-search:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Mount data dir so ChromaDB, cluster model, and corpus
      # persist across container restarts without re-indexing.
      - ./data:/app/data
    environment:
      - DATA_DIR=/app/data
      - CHROMA_PERSIST_DIR=/app/data/chroma_db
      - PROCESSED_DATA_PATH=/app/data/processed_corpus.jsonl
      - CLUSTER_MODEL_PATH=/app/data/cluster_model.joblib
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
      - N_CLUSTERS=23
      - CACHE_SIMILARITY_THRESHOLD=0.85
      - RETRIEVAL_TOP_K=5
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s